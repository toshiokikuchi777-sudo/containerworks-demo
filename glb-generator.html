<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>GLB Generator — Container Studio Parts</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,"Hiragino Kaku Gothic ProN",sans-serif;background:#0d1218;color:#e9eef3}
  h1{padding:18px 22px;font-size:15px;letter-spacing:.06em;border-bottom:1px solid #2a3542}
  h1 span{color:#4fb6d6}
  #grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;padding:16px}
  .card{background:#11161c;border:1px solid #2a3542;border-radius:10px;overflow:hidden;cursor:pointer}
  .card:hover{border-color:#4fb6d6}
  .card canvas{display:block;width:100%;height:160px}
  .card .info{padding:10px 12px;display:flex;align-items:center;justify-content:space-between}
  .card .name{font-size:12px;font-weight:600}
  .card .dl{background:#4fb6d6;color:#06222b;border:0;border-radius:6px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
  .card .dl:hover{filter:brightness(1.1)}
  #status{padding:10px 22px;font-size:11px;color:#6f8090}
</style>
</head>
<body>
<h1>GLB Generator — <span>Container Studio Parts</span></h1>
<div id="status">読み込み中…</div>
<div id="grid"></div>

<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFExporter } from 'three/addons/exporters/GLTFExporter.js';

/* ─ Materials ─ */
const M={
  red:   new THREE.MeshStandardMaterial({color:0xc0392b,roughness:.5,metalness:.25}),
  teal:  new THREE.MeshStandardMaterial({color:0x3f8a8a,roughness:.5,metalness:.25}),
  orange:new THREE.MeshStandardMaterial({color:0xd98a3d,roughness:.55,metalness:.2}),
  grass: new THREE.MeshStandardMaterial({color:0x6f9456,roughness:.55,metalness:.2}),
  gray:  new THREE.MeshStandardMaterial({color:0x8d8b85,roughness:.62,metalness:.45}),
  charcoal:new THREE.MeshStandardMaterial({color:0x4a4a4f,roughness:.55,metalness:.42}),
  sand:  new THREE.MeshStandardMaterial({color:0xb8a98f,roughness:.72,metalness:.1}),
  timber:new THREE.MeshStandardMaterial({color:0xc9ad82,roughness:.78,metalness:.04}),
  steel: new THREE.MeshStandardMaterial({color:0x1f1f24,roughness:.35,metalness:.8}),
  wood:  new THREE.MeshStandardMaterial({color:0xb4b1aa,roughness:.7,metalness:.05}),
  white: new THREE.MeshStandardMaterial({color:0xeeeef0,roughness:.85,emissive:0xdfe2e8,emissiveIntensity:0.34}),
  dark:  new THREE.MeshStandardMaterial({color:0x222228,roughness:.5,metalness:.4}),
  glass: new THREE.MeshStandardMaterial({color:0xd9eaf2,transparent:true,opacity:0.4,roughness:.2}),
  leaf:  new THREE.MeshStandardMaterial({color:0x6e776c,roughness:.85}),
  leaf2: new THREE.MeshStandardMaterial({color:0x808a7c,roughness:.85}),
  trunk: new THREE.MeshStandardMaterial({color:0x4e4a45,roughness:.8}),
  pot:   new THREE.MeshStandardMaterial({color:0x8a8884,roughness:.7}),
  purple:new THREE.MeshStandardMaterial({color:0x8a6fa8,roughness:.5,metalness:.25}),
};

/* ─ Builder helpers ─ */
let G=null;
function box(w,h,d,mat,x,y,z){
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
  m.position.set(x,y,z); m.castShadow=true; G.add(m); return m;
}
function cyl(rt,rb,h,seg,mat,x,y,z){
  const m=new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,seg),mat);
  m.position.set(x,y,z); m.castShadow=true; G.add(m); return m;
}
function blob(r,mat,x,y,z){
  const m=new THREE.Mesh(new THREE.IcosahedronGeometry(r,1),mat);
  m.position.set(x,y,z); m.castShadow=true; G.add(m); return m;
}
function cone(r,h,seg,mat,x,y,z){
  const m=new THREE.Mesh(new THREE.ConeGeometry(r,h,seg),mat);
  m.position.set(x,y,z); m.castShadow=true; G.add(m); return m;
}
function torus(R,r,seg,tseg,mat,x,y,z){
  const m=new THREE.Mesh(new THREE.TorusGeometry(R,r,seg,tseg),mat);
  m.position.set(x,y,z); G.add(m); return m;
}

/* ─ Part builders ─ */
const PARTS = [
  // 外構・植栽
  { id:'tree_pine',   name:'松の木',    cat:'外構',
    build(g){ G=g;
      cyl(0.1,0.14,1.8,8,M.trunk,0,0.9,0);
      [[1.1,0.55],[0.85,1.25],[0.6,1.9]].forEach(([r,cy])=>cone(r,1.0,8,M.leaf,0,cy,0)); } },
  { id:'tree_palm',   name:'ヤシの木',  cat:'外構',
    build(g){ G=g; const h=3.8;
      cyl(0.06,0.14,h,8,M.trunk,0,h/2,0);
      for(let i=0;i<3;i++){ const a=i*Math.PI*0.67; blob(0.1,M.dark,Math.cos(a)*0.12,h-0.05,Math.sin(a)*0.12); }
      for(let i=0;i<7;i++){ const a=i*Math.PI*2/7, len=2.2;
        const fr=box(len,0.05,0.14,M.leaf2,Math.cos(a)*len*0.5,h-0.25,Math.sin(a)*len*0.5);
        fr.rotation.y=-a; fr.rotation.z=-0.3; } } },
  { id:'tree_bamboo', name:'竹',        cat:'外構',
    build(g){ G=g;
      [[0,0,3.2],[0.15,0.1,3.8],[-.12,0.16,2.8],[0.07,-.14,3.5],[-.16,-.06,3.0]].forEach(([ox,oz,bh])=>{
        cyl(0.03,0.035,bh,6,M.grass,ox,bh/2,oz);
        const segs=Math.floor(bh/0.45);
        for(let i=1;i<segs;i++) cyl(0.042,0.042,0.04,8,M.leaf,ox,i*0.45,oz);
        box(0.5,0.02,0.05,M.leaf2,ox+0.25,bh-0.15,oz); }); } },
  { id:'lamp_post',   name:'街灯',      cat:'外構',
    build(g){ G=g; const h=3.2;
      cyl(0.04,0.055,h,8,M.charcoal,0,h/2,0);
      box(0.8,0.04,0.04,M.charcoal,0.4,h+0.04,0);
      cyl(0.18,0.12,0.22,8,M.dark,0.8,h+0.04,0);
      blob(0.12,M.white,0.8,h-0.06,0);
      cyl(0.12,0.16,0.15,8,M.charcoal,0,0.075,0); } },
  { id:'planter_box', name:'プランター',cat:'外構',
    build(g){ G=g;
      box(0.8,0.35,0.4,M.wood,0,0.175,0);
      box(0.74,0.24,0.34,M.timber,0,0.24,0);
      box(0.74,0.06,0.34,M.grass,0,0.39,0);
      for(let i=-1;i<=1;i++) box(0.06,0.22,0.06,M.leaf,i*0.2,0.52,0); } },
  { id:'fire_pit',    name:'焚き火',    cat:'外構',
    build(g){ G=g;
      cyl(0.55,0.35,0.22,12,M.charcoal,0,0.25,0);
      for(let i=0;i<3;i++){ const a=i*Math.PI*2/3;
        const lm=new THREE.Mesh(new THREE.CylinderGeometry(0.025,0.03,0.4,6),M.steel);
        lm.position.set(Math.cos(a)*0.42,0.18,Math.sin(a)*0.42);
        lm.rotation.x=Math.sin(a)*0.22; lm.rotation.z=-Math.cos(a)*0.22; g.add(lm); }
      const fireM=new THREE.MeshStandardMaterial({color:0xe86a10,emissive:0xd45608,emissiveIntensity:0.9,roughness:.9});
      cone(0.21,0.55,8,fireM,0,0.59,0);
      const innerM=new THREE.MeshStandardMaterial({color:0xfad06b,emissive:0xf0c020,emissiveIntensity:1.2,roughness:.9});
      cone(0.12,0.38,6,innerM,0,0.63,0); } },
  { id:'vending',     name:'自販機',    cat:'外構',
    build(g){ G=g;
      box(0.82,1.78,0.56,M.teal,0,0.89,0);
      box(0.68,1.05,0.02,M.glass,0,1.08,0.28);
      box(0.68,0.36,0.02,M.dark,0,0.28,0.28);
      for(let i=0;i<3;i++){ const bm=new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.03,0.02,6),M.red);
        bm.position.set(0.1+i*0.14,0.78,0.29); bm.rotation.x=Math.PI/2; g.add(bm); } } },
  { id:'bike',        name:'自転車',    cat:'外構',
    build(g){ G=g;
      for(const wz of [-0.5,0.5]){ const wm=new THREE.Mesh(new THREE.TorusGeometry(0.28,0.04,8,16),M.dark); wm.position.set(0,0.29,wz); wm.rotation.x=Math.PI/2; g.add(wm); }
      box(0.04,0.04,1.08,M.steel,0,0.6,0);
      box(0.04,0.42,0.035,M.steel,0,0.44,0.38);
      box(0.04,0.27,0.04,M.steel,0,0.64,-0.5);
      box(0.3,0.04,0.04,M.steel,0,0.78,-0.5);
      box(0.22,0.04,0.1,M.dark,0,0.74,0.38);
      cyl(0.05,0.05,0.08,8,M.charcoal,0,0.29,0).rotation.x=Math.PI/2; } },
  { id:'car',         name:'自動車',    cat:'外構',
    build(g){ G=g;
      box(2.0,0.72,4.6,M.red,0,0.55,0);
      box(1.75,0.68,2.4,M.red,0,1.31,0.1);
      box(1.6,0.52,0.04,M.glass,0,1.34,1.28);
      box(1.6,0.52,0.04,M.glass,0,1.34,-1.1);
      for(const [wx,wz] of [[-1,- 1.5],[-1,1.5],[1,-1.5],[1,1.5]]){
        const wm=new THREE.Mesh(new THREE.CylinderGeometry(0.33,0.33,0.24,12),M.dark); wm.position.set(wx,0.33,wz); wm.rotation.z=Math.PI/2; g.add(wm);
        const hm=new THREE.Mesh(new THREE.CylinderGeometry(0.16,0.16,0.26,8),M.steel); hm.position.set(wx,0.33,wz); hm.rotation.z=Math.PI/2; g.add(hm); }
      box(0.25,0.16,0.04,M.white,-0.7,0.65,-2.31);
      box(0.25,0.16,0.04,M.white,0.7,0.65,-2.31); } },
  // 内装・家具
  { id:'chair',       name:'椅子',      cat:'内装',
    build(g){ G=g;
      box(0.43,0.04,0.40,M.timber,0,0.45,0);
      box(0.43,0.42,0.04,M.timber,0,0.67,0.18);
      for(const [ex,ez] of [[-0.17,-0.16],[0.17,-0.16],[-0.17,0.14],[0.17,0.14]]) box(0.04,0.44,0.04,M.dark,ex,0.22,ez);
      box(0.37,0.04,0.04,M.dark,0,0.22,-0.16); box(0.37,0.04,0.04,M.dark,0,0.22,0.14); } },
  { id:'bar_stool',   name:'バーチェア', cat:'内装',
    build(g){ G=g;
      cyl(0.17,0.17,0.05,10,M.timber,0,0.75,0);
      cyl(0.025,0.03,0.73,8,M.steel,0,0.365,0);
      torus(0.15,0.015,6,12,M.steel,0,0.28,0);
      for(let i=0;i<4;i++){ const a=i*Math.PI/2+Math.PI/4; box(0.22,0.025,0.025,M.steel,Math.cos(a)*0.11,0.025,Math.sin(a)*0.11); } } },
  { id:'sofa',        name:'ソファ',    cat:'内装',
    build(g){ G=g; const w=1.8;
      box(w,0.38,0.72,M.gray,0,0.19,0);
      box(w-0.08,0.16,0.58,M.sand,0,0.46,-0.04);
      box(w,0.52,0.14,M.gray,0,0.69,0.29);
      box(0.14,0.5,0.72,M.gray,-w/2+0.07,0.44,0); box(0.14,0.5,0.72,M.gray,w/2-0.07,0.44,0);
      for(const [ex,ez] of [[-w/2+0.2,-0.3],[w/2-0.2,-0.3],[-w/2+0.2,0.3],[w/2-0.2,0.3]]) box(0.07,0.14,0.07,M.dark,ex,0.07,ez); } },
  { id:'dining_table',name:'ダイニングテーブル', cat:'内装',
    build(g){ G=g; const w=1.4,d=0.8;
      box(w,0.05,d,M.timber,0,0.74,0);
      for(const [ex,ez] of [[-w/2+0.1,-d/2+0.1],[w/2-0.1,-d/2+0.1],[-w/2+0.1,d/2-0.1],[w/2-0.1,d/2-0.1]]) box(0.06,0.73,0.06,M.dark,ex,0.365,ez); } },
  { id:'work_desk',   name:'デスク',    cat:'内装',
    build(g){ G=g; const w=1.4,d=0.65;
      box(w,0.05,d,M.timber,0,0.72,0);
      box(0.04,0.72,d-0.04,M.wood,-w/2+0.04,0.36,0); box(0.04,0.72,d-0.04,M.wood,w/2-0.04,0.36,0);
      box(w*0.5,0.03,0.34,M.dark,0,0.64,-d/2+0.06);
      box(0.56,0.38,0.03,M.dark,0,1.08,d/2-0.06);
      box(0.06,0.18,0.03,M.dark,0,0.80,d/2-0.06);
      box(0.24,0.04,0.12,M.dark,0,0.74,d/2-0.06); } },
  { id:'bookshelf',   name:'本棚',      cat:'内装',
    build(g){ G=g; const w=1.0,bsh=1.8;
      box(0.04,bsh,0.28,M.timber,-w/2,bsh/2,0); box(0.04,bsh,0.28,M.timber,w/2,bsh/2,0);
      box(w+0.04,0.04,0.28,M.timber,0,bsh-0.02,0); box(w+0.04,0.04,0.28,M.timber,0,0.02,0);
      const sh=3; for(let i=1;i<=sh;i++) box(w-0.04,0.03,0.28,M.timber,0,i*(bsh/(sh+1)),0);
      const bkc=[M.red,M.teal,M.orange,M.grass,M.purple,M.sand];
      for(let si=1;si<=sh;si++){ const sy=si*(bsh/(sh+1))+0.04; let bx=-w/2+0.08;
        bkc.forEach((bc,bi)=>{ if(bx+0.06>w/2-0.04) return; const bw=0.04+bi%2*0.02; box(bw,0.17,0.22,bc,bx+bw/2,sy+0.085,0); bx+=bw+0.015; }); } } },
  { id:'counter_bar', name:'バーカウンター', cat:'内装',
    build(g){ G=g; const w=2.0,d=0.55;
      box(w,0.9,d,M.timber,0,0.45,0);
      box(w+0.06,0.05,d+0.08,M.charcoal,0,0.905,0);
      box(w,0.15,0.04,M.dark,0,0.075,-d/2+0.02);
      box(w-0.1,0.04,d-0.12,M.timber,0,0.56,0); } },
  { id:'indoor_plant',name:'観葉植物',  cat:'内装',
    build(g){ G=g;
      box(0.42,0.46,0.42,M.pot,0,0.23,0);
      blob(0.44,M.leaf,0,0.78,0); blob(0.32,M.leaf2,0.13,1.05,0); } },
];

/* ─ Exporter ─ */
const exporter = new GLTFExporter();
function exportGLB(part){
  const scene = new THREE.Scene();
  G = scene;
  part.build(scene);
  exporter.parse(scene, gltf=>{
    const blob = new Blob([gltf],{type:'application/octet-stream'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download=`cw_${part.id}.glb`; a.click();
  },err=>console.error(err),{binary:true});
}

/* ─ Mini renderer per card ─ */
function makeCard(part){
  const card=document.createElement('div'); card.className='card';
  const canvas=document.createElement('canvas'); canvas.width=400; canvas.height=320;
  card.appendChild(canvas);

  const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
  renderer.setPixelRatio(devicePixelRatio); renderer.shadowMap.enabled=true;
  renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  renderer.outputColorSpace=THREE.SRGBColorSpace;
  renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.1;

  const scene=new THREE.Scene(); scene.background=new THREE.Color(0x0d1218);
  const cam=new THREE.PerspectiveCamera(40,400/320,0.01,100);
  const hemi=new THREE.HemisphereLight(0xeef1f4,0x595960,0.7); scene.add(hemi);
  const sun=new THREE.DirectionalLight(0xffffff,1.8); sun.position.set(4,7,5); sun.castShadow=true; scene.add(sun);
  const fill=new THREE.DirectionalLight(0x8ab0c0,0.4); fill.position.set(-4,3,-4); scene.add(fill);
  const ground=new THREE.Mesh(new THREE.PlaneGeometry(20,20),new THREE.MeshStandardMaterial({color:0x1a2028,roughness:.97}));
  ground.rotation.x=-Math.PI/2; ground.receiveShadow=true; scene.add(ground);

  G=scene; part.build(scene);

  // Auto-fit camera
  const box3=new THREE.Box3().setFromObject(scene);
  const center=box3.getCenter(new THREE.Vector3()), size=box3.getSize(new THREE.Vector3());
  const maxDim=Math.max(size.x,size.y,size.z);
  const dist=maxDim*1.55;
  cam.position.set(center.x+dist*0.9,center.y+dist*0.75,center.z+dist*1.1);
  cam.lookAt(center);

  const controls=new OrbitControls(cam,canvas);
  controls.target.copy(center); controls.enableDamping=true;
  controls.autoRotate=true; controls.autoRotateSpeed=0.8;

  function animate(){ requestAnimationFrame(animate); controls.update(); renderer.render(scene,cam); }
  animate();

  const info=document.createElement('div'); info.className='info';
  const nm=document.createElement('span'); nm.className='name';
  nm.textContent=`${part.name}（${part.cat}）`;
  const dl=document.createElement('button'); dl.className='dl'; dl.textContent='↓ GLB';
  dl.onclick=e=>{ e.stopPropagation(); exportGLB(part); };
  info.appendChild(nm); info.appendChild(dl); card.appendChild(info);
  return card;
}

const grid=document.getElementById('grid');
PARTS.forEach(p=>grid.appendChild(makeCard(p)));
document.getElementById('status').textContent=`${PARTS.length}種のパーツを表示。各カードで回転確認 → 「↓ GLB」でダウンロード`;
</script>
</body>
</html>
