  #header{padding:18px 24px 12px;border-bottom:1px solid #2a3542;display:flex;align-items:center;gap:16px}
  #header h1{font-size:16px;letter-spacing:.07em;flex:1}
  #header h1 span{color:#4fb6d6}

  #grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px;padding:0 16px 24px}
  .card{background:#111922;border:1px solid #2a3542;border-radius:12px;overflow:hidden;transition:border-color .18s}

  .card canvas{display:block;width:100%;height:220px;background:#0d1218}
  .card .info{padding:10px 13px 12px;display:flex;align-items:center;gap:8px}
  .card .names{flex:1;min-width:0}
  .card .name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card .sub{font-size:10px;color:#6f8090;margin-top:2px}
  .card .dl{background:#4fb6d6;color:#06222b;border:0;border-radius:7px;padding:7px 13px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0}
  .card .dl:hover{filter:brightness(1.1)}
  .cat-divider{grid-column:1/-1;padding:10px 8px 2px;font-size:10px;font-weight:700;letter-spacing:.1em;color:#4fb6d6;border-top:1px solid #1a2430;margin-top:4px}
</style>
</head>

import * as THREE from 'three';

/* ─ Materials ─ */
const mk=(c,r=.55,m=.2)=>new THREE.MeshStandardMaterial({color:c,roughness:r,metalness:m});
const mkE=(c,e,ei)=>new THREE.MeshStandardMaterial({color:c,roughness:.85,emissive:e,emissiveIntensity:ei});
const M={
  red:mk(0xc0392b,.5,.25),  teal:mk(0x3f8a8a,.5,.25),  orange:mk(0xd98a3d,.55,.2),
  grass:mk(0x6f9456,.55,.2), gray:mk(0x8d8b85,.62,.45), charcoal:mk(0x4a4a4f,.55,.42),
  sand:mk(0xb8a98f,.72,.1),  timber:mk(0xc9ad82,.78,.04),steel:mk(0x1f1f24,.35,.8),
  wood:mk(0xb4b1aa,.7,.05),  dark:mk(0x222228,.5,.4),   white:mkE(0xeeeef0,0xdfe2e8,.34),
  glass:new THREE.MeshStandardMaterial({color:0xd9eaf2,transparent:true,opacity:.45,roughness:.15}),
  leaf:mk(0x6e776c,.85,0),   leaf2:mk(0x808a7c,.85,0),  trunk:mk(0x4e4a45,.8,0),
  pot:mk(0x8a8884,.7,0),     purple:mk(0x8a6fa8,.5,.25), blue:mk(0x2e6da4,.5,.25),
  cream:mk(0xe8dfd0,.72,.05),navy:mk(0x253a5e,.5,.28),  pine:mk(0x4a7a50,.7,0),
  bk:mk(0x18191f,.4,.5),     beige:mk(0xd4c4a8,.72,.04),olive:mk(0x7a8a5a,.6,.05),
};
const fireM=new THREE.MeshStandardMaterial({color:0xe86a10,emissive:0xd45608,emissiveIntensity:.9,roughness:.9});
const innerM=new THREE.MeshStandardMaterial({color:0xfad06b,emissive:0xf0c020,emissiveIntensity:1.2,roughness:.9});

/* ─ Helpers ─ */
let G=null;
const box=(w,h,d,mat,x,y,z)=>{const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);m.position.set(x,y,z);m.castShadow=true;G.add(m);return m;};
const cyl=(rt,rb,h,seg,mat,x,y,z)=>{const m=new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,seg),mat);m.position.set(x,y,z);m.castShadow=true;G.add(m);return m;};
const cone=(r,h,seg,mat,x,y,z)=>{const m=new THREE.Mesh(new THREE.ConeGeometry(r,h,seg),mat);m.position.set(x,y,z);m.castShadow=true;G.add(m);return m;};
const blob=(r,mat,x,y,z)=>{const m=new THREE.Mesh(new THREE.IcosahedronGeometry(r,1),mat);m.position.set(x,y,z);m.castShadow=true;G.add(m);return m;};
const tor=(R,r,s,t,mat,x,y,z,rx=0)=>{const m=new THREE.Mesh(new THREE.TorusGeometry(R,r,s,t),mat);m.position.set(x,y,z);if(rx)m.rotation.x=rx;G.add(m);return m;};

{cat:'椅子',id:'chair_office',name:'オフィスチェア',sub:'キャスター・ハイバック',build(g){G=g;

{cat:'棚',id:'shelf_tall',name:'本棚（ハイタイプ）',sub:'3段・カラフルな本付き',build(g){G=g;const w=1.0,bsh=1.8;

/* ─ Exporter ─ */
const exporter = new GLTFExporter();
function exportGLB(part, cb){
  const sc=new THREE.Scene(); G=sc; part.build(sc);
  exporter.parse(sc,gltf=>{
    const blob=new Blob([gltf],{type:'application/octet-stream'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`cw_${part.id}.glb`; a.click();
    if(cb) cb();
  },err=>console.error(err),{binary:true});
}

/* ─ Download all sequentially ─ */
document.getElementById('dlAll').onclick=async()=>{
  for(const p of PARTS){
    await new Promise(res=>{exportGLB(p,res); setTimeout(res,400);});
    await new Promise(res=>setTimeout(res,250));
  }
};

/* ─ Mini renderer per card ─ */
function makeCard(part){
  const card=document.createElement('div'); card.className='card';
  const canvas=document.createElement('canvas'); canvas.width=540; canvas.height=440;
  card.appendChild(canvas);

  const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:false});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  renderer.outputColorSpace=THREE.SRGBColorSpace;
  renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.15;

  const scene=new THREE.Scene(); scene.background=new THREE.Color(0x0d1218);
  const cam=new THREE.PerspectiveCamera(38,540/440,.01,200);
  scene.add(new THREE.HemisphereLight(0xeef1f4,0x595960,.75));
  const sun=new THREE.DirectionalLight(0xffffff,2.0); sun.position.set(5,8,6); sun.castShadow=true;
  sun.shadow.mapSize.set(1024,1024); scene.add(sun);
  const fill=new THREE.DirectionalLight(0x8ab0c0,.5); fill.position.set(-5,4,-5); scene.add(fill);
  const back=new THREE.DirectionalLight(0xffdcb0,.3); back.position.set(2,3,-7); scene.add(back);
  const ground=new THREE.Mesh(new THREE.PlaneGeometry(20,20),new THREE.MeshStandardMaterial({color:0x141a22,roughness:.97}));
  ground.rotation.x=-Math.PI/2; ground.receiveShadow=true; scene.add(ground);

  G=scene; part.build(scene);

  const box3=new THREE.Box3().setFromObject(scene);
  const center=box3.getCenter(new THREE.Vector3()), size=box3.getSize(new THREE.Vector3());
  const maxDim=Math.max(size.x,size.y,size.z);
  const dist=maxDim*1.7;
  cam.position.set(center.x+dist*.85,center.y+dist*.7,center.z+dist*1.1);
  cam.lookAt(center);

  const controls=new OrbitControls(cam,canvas);
  controls.target.copy(center); controls.enableDamping=true;
  controls.autoRotate=true; controls.autoRotateSpeed=1.2;
  controls.minDistance=maxDim*.5; controls.maxDistance=maxDim*4;

  function animate(){ requestAnimationFrame(animate); controls.update(); renderer.render(scene,cam); }
  animate();

  const info=document.createElement('div'); info.className='info';
  const names=document.createElement('div'); names.className='names';
  const nm=document.createElement('div'); nm.className='name'; nm.textContent=part.name;
  const sb=document.createElement('div'); sb.className='sub'; sb.textContent=part.sub;
  names.appendChild(nm); names.appendChild(sb);
  const dl=document.createElement('button'); dl.className='dl'; dl.textContent='↓ GLB';
  dl.onclick=e=>{ e.stopPropagation(); exportGLB(part); };
  info.appendChild(names); info.appendChild(dl); card.appendChild(info);
  return card;
}

const grid=document.getElementById('grid');

  }
  grid.appendChild(makeCard(p));
});
